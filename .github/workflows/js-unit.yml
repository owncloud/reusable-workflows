on:
  workflow_call:
    inputs:
      app-name:
        description: 'Name of the app'
        required: true
        type: string
      php-version:
        description: PHP version the server should be setup with
        required: true
        type: string
      core-ref:
        description: git reference to checkout for core
        required: false
        type: string
        default: ''
      app-repository:
        description: 'Repository of the app (optional, defaults to the current repository)'
        required: false
        type: string
        default: ''
      additional-packages:
        description: Additional Linux packages to be installed - space separated
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  js-unit:
    name: Javascript Unit
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout reusable-workflows
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: owncloud/reusable-workflows
          ref: ${{ github.workflow_sha }}
          path: _rw
          persist-credentials: false

      - name: Setup ownCloud environment
        uses: ./_rw/.github/actions/setup-owncloud-env
        with:
          app-name: ${{ inputs.app-name }}
          app-repository: ${{ inputs.app-repository }}
          core-ref: ${{ inputs.core-ref }}
          php-version: ${{ inputs.php-version }}

      - name: Setup PHP and server
        uses: ./_rw/.github/actions/setup-php-server
        with:
          php-version: ${{ inputs.php-version }}
          additional-packages: ${{ inputs.additional-packages }}

      - name: Setup app
        env:
          APP_NAME: ${{ inputs.app-name }}
        run: |
          ( cd "apps/${APP_NAME}" && make vendor || true)
          php occ a:e "${APP_NAME}"

      - name: Run jsunit
        env:
          APP_NAME: ${{ inputs.app-name }}
        run: |
          cd "apps/${APP_NAME}"
          make test-js
