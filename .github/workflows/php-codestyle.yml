on:
  workflow_call:
    inputs:
      app-name:
        description: 'Name of the app'
        required: true
        type: string
      php-versions:
        description: JSON array of PHP versions
        required: true
        type: string
      app-repository:
        description: 'Repository of the app (optional, defaults to the current repository)'
        required: false
        type: string
        default: ''
      disable-phpstan:
        description: 'Whether to disable PHPStan checks'
        required: false
        type: boolean
        default: false
      disable-phan:
        description: 'Whether to disable Phan checks'
        required: false
        type: boolean
        default: false
      additional-app:
        description: 'Additional app to enable for testing'
        required: false
        type: string
        default: ''
      core-ref:
        description: 'Git ref to checkout for owncloud/core (optional, defaults to the default branch)'
        required: false
        type: string
        default: ''
      app-ref:
        description: 'Git ref to checkout for owncloud/${ inputs.app-name } (optional, defaults to the default branch)'
        required: false
        type: string
        default: ''

jobs:
  php-codestyle:
    name: PHP Code Style
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        php: ${{ fromJSON(inputs.php-versions) }}

    steps:
      - name: Clone owncloud/core
        uses: actions/checkout@v4
        with:
          repository: owncloud/core
          ref: ${{ inputs.core-ref }}

      - name: Checkout apps/${{ inputs.app-name }}
        uses: actions/checkout@v4
        with:
          path: apps/${{ inputs.app-name }}
          repository: ${{ inputs.app-repository }}
          ref: ${{ inputs.app-ref }}

      - name: Checkout apps/${{ inputs.additional-app }}
        if: ${{ inputs.additional-app != '' }}
        uses: actions/checkout@v4
        with:
          path: apps/${{ inputs.additional-app }}
          repository: owncloud/${{ inputs.additional-app }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, gd, json, xml, zip
          ini-values: "memory_limit=1024M"

      - name: Install Composer dependencies
        run: |
          make install-composer-deps
          make vendor-bin-deps

      - name: Install Server
        run: |
          DATA_DIRECTORY=$(pwd)/data bash tests/drone/install-server.sh

      - name: Setup App
        run: |
          php occ a:e ${{ inputs.app-name }}

      - name: Run PHP Code Style Checks
        run: |
          cd apps/${{ inputs.app-name }}
          make test-php-style

      - name: Run PHP Stan
        if: ${{ !inputs.disable-phpstan }}
        run: |
          cd apps/${{ inputs.app-name }}
          make test-php-phpstan

      - name: Run PHP Phan
        if: ${{ !inputs.disable-phan }}
        run: |
          cd apps/${{ inputs.app-name }}
          make test-php-phan

