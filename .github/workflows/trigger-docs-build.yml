name: Trigger Docs Build

on:
  workflow_call:
    secrets:
      DOCS_TRIGGER_APP_ID:
        required: true
      DOCS_TRIGGER_APP_PRIVATE_KEY:
        required: true

jobs:
  trigger:
    name: Trigger owncloud/docs rebuild
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.DOCS_TRIGGER_APP_ID }}
          private-key: ${{ secrets.DOCS_TRIGGER_APP_PRIVATE_KEY }}
          owner: owncloud
          repositories: docs

      - name: Trigger docs rebuild
        run: |
          gh api repos/owncloud/docs/actions/workflows/ci.yml/dispatches \
            --method POST \
            --field ref=master
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
