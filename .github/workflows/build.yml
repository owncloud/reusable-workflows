on:
  workflow_call:
    inputs:
      app-name:
        description: 'Name of the app (used for the artifact name, defaults to the repository name)'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build
        run: make dist

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.app-name || github.event.repository.name }}
          path: build/**/*.tar.gz
