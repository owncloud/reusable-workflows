on:
  workflow_call:

jobs:
  validate-semantic-commits:
    name: Validate semantic commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Validate commit messages
        uses: docker://aevea/commitsar:909c3ab676c9af63cb84f2e38f395c7e89829b04 # v1.0.3

